<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTML Audio and Video Lab</title>
</head>
<body>
  <h1>Space Exploration Media Archive</h1>

  <!-- Video -->
  <section>
    <h2>Understanding Space Logistics: The Map Method</h2>
    <video controls width="640">
      <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </section>

  <!-- Audio -->
  <section>
    <h2>Ambient Mission Soundtrack: Sailing Away</h2>
    <audio controls loop src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3">
      Your browser does not support the audio tag.
    </audio>
  </section>

</body>
</html>
